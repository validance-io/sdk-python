name: Publish to PyPI

# Triggers:
#   - Push of a tag matching v* (e.g., v0.1.0) → builds, smoke-checks, publishes
#     to TestPyPI, then publishes to PyPI (gated by the `pypi` environment).
#   - Manual run from the Actions tab (workflow_dispatch) for dry-runs that
#     stop after the build job (no tag → publishing jobs won't have a version
#     to publish, so use this only to verify the build).
#
# Trusted Publishing (OIDC): both `testpypi` and `pypi` jobs are gated by a
# GitHub Actions environment of the same name. The corresponding pending
# publisher must be configured on test.pypi.org and pypi.org respectively
# before the first run. See README / RELEASING for setup details.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distribution
        run: python -m build

      - name: Smoke-check the wheel (import + version match tag)
        run: |
          python -m pip install dist/*.whl
          python -c "
          import validance, os
          version = validance.__contract_version__
          tag = os.environ.get('GITHUB_REF_NAME', '')
          print(f'__contract_version__ = {version!r}')
          print(f'GITHUB_REF_NAME     = {tag!r}')
          if tag.startswith('v') and tag[1:] != version:
              raise SystemExit(
                  f'Tag {tag!r} does not match __contract_version__ {version!r}; '
                  f'bump validance/__init__.py before tagging.'
              )
          "

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/validance-sdk
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    needs: publish-to-testpypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/validance-sdk
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
